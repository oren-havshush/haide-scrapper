databases:
  - name: scrapnew-db
    databaseName: scrapnew
    user: scrapnew
    plan: basic-256mb
    postgresMajorVersion: "16"
    region: frankfurt

services:
  - type: web
    name: scrapnew-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: frankfurt
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scrapnew-db
          property: connectionString
      - key: API_TOKEN
        value: haideScrapper
      - key: NEXT_PUBLIC_API_TOKEN
        value: haideScrapper
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"

  - type: worker
    name: scrapnew-worker
    runtime: docker
    dockerfilePath: ./Dockerfile.worker
    dockerContext: .
    plan: starter
    region: frankfurt
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scrapnew-db
          property: connectionString
      - key: API_TOKEN
        value: haideScrapper
      - key: NEXT_PUBLIC_APP_URL
        value: https://scrapnew-web.onrender.com
      - key: NODE_ENV
        value: production
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /ms-playwright
      - key: SCRAPE_LOCALE
        value: he-IL
      - key: SCRAPE_TIMEZONE
        value: Asia/Jerusalem
      - key: SCRAPE_ACCEPT_LANGUAGE
        value: he-IL,he;q=0.9,en-US;q=0.8,en;q=0.7
      # Optional: enable AI-powered selector refinement for low-confidence sites
      - key: OPENAI_API_KEY
        sync: false
