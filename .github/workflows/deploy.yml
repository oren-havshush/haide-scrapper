name: Deploy

on:
  workflow_dispatch:
    inputs:
      host:
        description: "Deploy target (user@host)"
        required: true
      ssh_key_secret:
        description: "Name of the SSH key secret"
        required: false
        default: "DEPLOY_SSH_KEY"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets[github.event.inputs.ssh_key_secret] }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $(echo "${{ github.event.inputs.host }}" | cut -d@ -f2) >> ~/.ssh/known_hosts

      - name: Deploy
        run: ./deploy.sh "${{ github.event.inputs.host }}" ~/.ssh/deploy_key
