name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - name: Build Next.js
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          API_TOKEN: "build-placeholder"
        run: pnpm build

      - name: Build worker
        run: pnpm worker:build

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - name: Build web image
        run: docker build -t scrapnew-web:${{ github.sha }} .

      - name: Build worker image
        run: docker build -t scrapnew-worker:${{ github.sha }} -f Dockerfile.worker .
